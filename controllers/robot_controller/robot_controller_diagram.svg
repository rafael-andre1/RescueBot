<svg viewBox="0 0 1480 940" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e8722c"/>
    </marker>
    <radialGradient id="beaconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ca02c" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#2ca02c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== background ===== -->
  <rect x="0" y="0" width="1480" height="940" fill="#ffffff"/>

  <!-- ===== title ===== -->
  <text x="40" y="46" font-size="27" font-weight="700" fill="#1a1a1a">RescueBot: how one robot finds and reaches a beacon</text>
  <text x="40" y="72" font-size="14.5" fill="#666">A SLAM rescue scout for unmapped, unsafe environments: no GPS, goal location unknown, walls discovered while driving.</text>

  <!-- =================================================================== -->
  <!--  LEFT: MAP SCENE                                                      -->
  <!-- =================================================================== -->
  <!-- map frame -->
  <rect x="40" y="96" width="880" height="812" rx="6" fill="#ededed" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- explored (free) region = white blob over the grey "unexplored" base -->
  <path d="M120,150 L820,128 Q872,140 872,330 L860,640 Q850,840 640,856 L210,860 Q88,852 88,560 L96,300 Q98,170 120,150 Z"
        fill="#ffffff"/>

  <!-- grid -->
  <g stroke="#d6d6d6" stroke-width="1" stroke-dasharray="4 5">
    <line x1="40" y1="232" x2="920" y2="232"/>
    <line x1="40" y1="368" x2="920" y2="368"/>
    <line x1="40" y1="504" x2="920" y2="504"/>
    <line x1="40" y1="640" x2="920" y2="640"/>
    <line x1="40" y1="776" x2="920" y2="776"/>
    <line x1="187" y1="96" x2="187" y2="908"/>
    <line x1="334" y1="96" x2="334" y2="908"/>
    <line x1="481" y1="96" x2="481" y2="908"/>
    <line x1="628" y1="96" x2="628" y2="908"/>
    <line x1="775" y1="96" x2="775" y2="908"/>
  </g>

  <!-- ===== obstacles: safety-inflation halo (light) drawn BEHIND walls ===== -->
  <g fill="#d8cee8">
    <rect x="250" y="590" width="180" height="54" rx="5"/>
    <rect x="350" y="390" width="54" height="170" rx="5"/>
    <rect x="460" y="460" width="170" height="52" rx="5"/>
    <rect x="550" y="320" width="130" height="54" rx="5"/>
    <rect x="240" y="460" width="50" height="50" rx="5"/>
    <rect x="630" y="420" width="48" height="48" rx="5"/>
    <rect x="460" y="290" width="48" height="48" rx="5"/>
  </g>
  <!-- ===== obstacles: walls (dark) ===== -->
  <g fill="#2e2e2e">
    <rect x="260" y="600" width="160" height="34" rx="3"/>
    <rect x="360" y="400" width="34" height="150" rx="3"/>
    <rect x="470" y="470" width="150" height="32" rx="3"/>
    <rect x="560" y="330" width="110" height="34" rx="3"/>
    <rect x="250" y="470" width="30" height="30" rx="3"/>
    <rect x="640" y="430" width="28" height="28" rx="3"/>
    <rect x="470" y="300" width="28" height="28" rx="3"/>
  </g>

  <!-- ===== LiDAR fan from the robot (subtle) ===== -->
  <g stroke="#3f9be0" stroke-width="1.4" opacity="0.40">
    <line x1="150" y1="730" x2="150" y2="600"/>
    <line x1="150" y1="730" x2="206" y2="612"/>
    <line x1="150" y1="730" x2="255" y2="660"/>
    <line x1="150" y1="730" x2="256" y2="722"/>
    <line x1="150" y1="730" x2="232" y2="800"/>
    <line x1="150" y1="730" x2="150" y2="824"/>
    <line x1="150" y1="730" x2="78" y2="800"/>
    <line x1="150" y1="730" x2="60" y2="728"/>
    <line x1="150" y1="730" x2="74" y2="648"/>
  </g>

  <!-- ===== planned path (Dijkstra route, weaving around walls) ===== -->
  <polyline points="150,730 200,650 235,560 300,510 330,440 345,380 430,365 500,350 540,315 600,295 690,275 765,232"
            fill="none" stroke="#e8722c" stroke-width="4.5" stroke-linecap="round"
            stroke-linejoin="round" marker-end="url(#arrow)"/>
  <!-- cost-gradient dots along the path -->
  <g fill="#e8722c" opacity="0.55">
    <circle cx="235" cy="560" r="3.2"/>
    <circle cx="330" cy="440" r="3.2"/>
    <circle cx="430" cy="365" r="3.2"/>
    <circle cx="540" cy="315" r="3.2"/>
    <circle cx="600" cy="295" r="3.2"/>
  </g>

  <!-- ===== beacon (goal) with SOS signal rings ===== -->
  <circle cx="770" cy="215" r="60" fill="url(#beaconGlow)"/>
  <g fill="none" stroke="#2ca02c" stroke-width="1.6" opacity="0.55" stroke-dasharray="3 6">
    <circle cx="770" cy="215" r="36"/>
    <circle cx="770" cy="215" r="52"/>
    <circle cx="770" cy="215" r="70"/>
  </g>
  <polygon points="770,193 775.3,207.7 790.9,208.2 778.6,217.8 782.9,232.8 770,224 757.1,232.8 761.4,217.8 749.1,208.2 764.7,207.7"
           fill="#2ca02c" stroke="#1c5e1c" stroke-width="1.3"/>
  <text x="770" y="266" font-size="13.5" font-weight="700" fill="#1c5e1c" text-anchor="middle">BEACON (goal)</text>
  <text x="770" y="283" font-size="11.5" fill="#4a7a4a" text-anchor="middle">pinging "SOS"</text>

  <!-- ===== robot (mock e-puck) ===== -->
  <!-- start marker (+) -->
  <g stroke="#6a3fb5" stroke-width="3">
    <line x1="150" y1="772" x2="150" y2="792"/>
    <line x1="140" y1="782" x2="160" y2="782"/>
  </g>
  <text x="150" y="812" font-size="11.5" fill="#6a3fb5" text-anchor="middle" font-weight="600">start</text>
  <!-- body -->
  <circle cx="150" cy="730" r="20" fill="#7b4fc7" stroke="#ffffff" stroke-width="2.5"/>
  <!-- heading indicator (pointing along the path, up-right) -->
  <line x1="150" y1="730" x2="172" y2="708" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <text x="150" y="704" font-size="12.5" font-weight="700" fill="#4a2a86" text-anchor="middle">e-puck</text>

  <!-- ===== legend (bottom-right of map) ===== -->
  <g transform="translate(648,690)">
    <rect x="0" y="0" width="256" height="200" rx="6" fill="#ffffff" stroke="#cfcfcf" stroke-width="1.2" opacity="0.96"/>
    <text x="14" y="24" font-size="13" font-weight="700" fill="#333">Legend</text>
    <rect x="14" y="36" width="20" height="13" fill="#2e2e2e"/>
    <text x="42" y="47" font-size="12" fill="#444">Wall (LiDAR-mapped)</text>
    <rect x="14" y="56" width="20" height="13" fill="#d8cee8"/>
    <text x="42" y="67" font-size="12" fill="#444">Safety margin (inflation)</text>
    <rect x="14" y="76" width="20" height="13" fill="#ffffff" stroke="#bbb"/>
    <text x="42" y="87" font-size="12" fill="#444">Free / explored</text>
    <rect x="14" y="96" width="20" height="13" fill="#ededed" stroke="#bbb"/>
    <text x="42" y="107" font-size="12" fill="#444">Unexplored</text>
    <line x1="14" y1="123" x2="34" y2="123" stroke="#e8722c" stroke-width="4" stroke-linecap="round"/>
    <text x="42" y="127" font-size="12" fill="#444">Planned path (Dijkstra)</text>
    <line x1="14" y1="143" x2="34" y2="143" stroke="#3f9be0" stroke-width="2" opacity="0.6"/>
    <text x="42" y="147" font-size="12" fill="#444">LiDAR beam</text>
    <circle cx="24" cy="164" r="8" fill="#7b4fc7" stroke="#fff" stroke-width="1.5"/>
    <text x="42" y="168" font-size="12" fill="#444">RescueBot (e-puck)</text>
    <polygon points="24,178 26.4,185 33.6,185.2 27.9,189.6 30,196.6 24,192 18,196.6 20.1,189.6 14.4,185.2 21.6,185" fill="#2ca02c" stroke="#1c5e1c" stroke-width="0.8"/>
    <text x="42" y="190" font-size="12" fill="#444">Beacon / goal</text>
  </g>

  <!-- =================================================================== -->
  <!--  RIGHT: PROCESS STEPS (top to bottom)                                 -->
  <!-- =================================================================== -->
  <text x="958" y="120" font-size="20" font-weight="700" fill="#1a1a1a">The full control loop, step by step</text>
  <line x1="958" y1="132" x2="1452" y2="132" stroke="#e3e3e3" stroke-width="1.5"/>

  <!-- connecting spine -->
  <line x1="978" y1="168" x2="978" y2="872" stroke="#e3d6f2" stroke-width="2.5"/>

  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- step template: badge + bold title + wrapped description -->

    <!-- 1 -->
    <circle cx="978" cy="168" r="16" fill="#7b4fc7"/>
    <text x="978" y="173" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="1006" y="164" font-size="15.5" font-weight="700" fill="#1a1a1a">Locate itself (no GPS)</text>
    <text x="1006" y="184" font-size="13" fill="#555">Counts wheel-encoder turns and reads the compass to</text>
    <text x="1006" y="201" font-size="13" fill="#555">dead-reckon its own position and heading.</text>

    <!-- 2 -->
    <circle cx="978" cy="238" r="16" fill="#7b4fc7"/>
    <text x="978" y="243" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="1006" y="234" font-size="15.5" font-weight="700" fill="#1a1a1a">Hear the SOS</text>
    <text x="1006" y="254" font-size="13" fill="#555">A trapped beacon pings over the radio; each ping carries</text>
    <text x="1006" y="271" font-size="13" fill="#555">a relative bearing and a signal strength.</text>

    <!-- 3 -->
    <circle cx="978" cy="308" r="16" fill="#7b4fc7"/>
    <text x="978" y="313" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="1006" y="304" font-size="15.5" font-weight="700" fill="#1a1a1a">Estimate the goal</text>
    <text x="1006" y="324" font-size="13" fill="#555">Strength &#8594; distance (&#8776;1/&#8730;s); bearing + heading &#8594; world</text>
    <text x="1006" y="341" font-size="13" fill="#555">direction. Together they project where the goal is.</text>

    <!-- 4 -->
    <circle cx="978" cy="378" r="16" fill="#7b4fc7"/>
    <text x="978" y="383" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="1006" y="374" font-size="15.5" font-weight="700" fill="#1a1a1a">Bid for the task (auction)</text>
    <text x="1006" y="394" font-size="13" fill="#555">Estimates travel cost over the known map (+1.5&#215; for the</text>
    <text x="1006" y="411" font-size="13" fill="#555">unmapped gap). A manager assigns each beacon to the</text>
    <text x="1006" y="428" font-size="13" fill="#555">cheapest robot, and can reassign as the team moves.</text>

    <!-- 5 -->
    <circle cx="978" cy="465" r="16" fill="#7b4fc7"/>
    <text x="978" y="470" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="1006" y="461" font-size="15.5" font-weight="700" fill="#1a1a1a">Map as it goes (SLAM)</text>
    <text x="1006" y="481" font-size="13" fill="#555">The LiDAR sweeps every step; rays are traced into a</text>
    <text x="1006" y="498" font-size="13" fill="#555">200&#215;200 occupancy grid scoring each cell wall vs. free.</text>

    <!-- 6 -->
    <circle cx="978" cy="535" r="16" fill="#7b4fc7"/>
    <text x="978" y="540" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="1006" y="531" font-size="15.5" font-weight="700" fill="#1a1a1a">Add a safety buffer</text>
    <text x="1006" y="551" font-size="13" fill="#555">Walls are "inflated" by a few cells so any planned path</text>
    <text x="1006" y="568" font-size="13" fill="#555">leaves clearance for the robot's real body width.</text>

    <!-- 7 -->
    <circle cx="978" cy="605" r="16" fill="#e8722c"/>
    <text x="978" y="610" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">7</text>
    <text x="1006" y="601" font-size="15.5" font-weight="700" fill="#1a1a1a">Plan the route</text>
    <text x="1006" y="621" font-size="13" fill="#555">Bidirectional Dijkstra finds the cheapest path around</text>
    <text x="1006" y="638" font-size="13" fill="#555">known walls, written as a downhill cost gradient to follow.</text>

    <!-- 8 -->
    <circle cx="978" cy="675" r="16" fill="#e8722c"/>
    <text x="978" y="680" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">8</text>
    <text x="1006" y="671" font-size="15.5" font-weight="700" fill="#1a1a1a">Drive</text>
    <text x="1006" y="691" font-size="13" fill="#555">Steers straight at the goal when it's in line of sight, else</text>
    <text x="1006" y="708" font-size="13" fill="#555">follows the gradient; differential wheels turn and advance.</text>

    <!-- 9 -->
    <circle cx="978" cy="745" r="16" fill="#7b4fc7"/>
    <text x="978" y="750" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">9</text>
    <text x="1006" y="741" font-size="15.5" font-weight="700" fill="#1a1a1a">Adapt &amp; avoid teammates</text>
    <text x="1006" y="761" font-size="13" fill="#555">A newly found wall triggers an instant replan. Peers</text>
    <text x="1006" y="778" font-size="13" fill="#555">broadcast position; the lower-priority robot yields and</text>
    <text x="1006" y="795" font-size="13" fill="#555">the planner simply routes around it.</text>

    <!-- 10 -->
    <circle cx="978" cy="832" r="16" fill="#2ca02c"/>
    <text x="978" y="837" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">10</text>
    <text x="1006" y="828" font-size="15.5" font-weight="700" fill="#1a1a1a">Confirm &amp; rescue</text>
    <text x="1006" y="848" font-size="13" fill="#555">Up close the camera verifies the beacon's colour; in range</text>
    <text x="1006" y="865" font-size="13" fill="#555">it's marked RESCUED on the shared global map, then the</text>
    <text x="1006" y="882" font-size="13" fill="#555">robot returns to idle (or exits when the mission ends).</text>
  </g>

  <!-- footer note -->
  <text x="40" y="930" font-size="11.5" fill="#999">Steps 5 to 8 repeat every control tick (32 ms): map, inflate, plan, drive. The whole team merges its grids into one shared world map.</text>
</svg>
